{{ define "forgot_password.html" }}
{{ template "header.html" . }}
    <div class="flex items-center min-h-screen p-6 bg-gray-50 dark:bg-gray-900">
      <div class="flex-1 h-full max-w-4xl mx-auto overflow-hidden bg-white rounded-lg shadow-md dark:bg-gray-800">
        <div class="flex flex-col overflow-y-auto md:flex-row">
          <div class="h-32 md:h-auto md:w-1/2">
            <img
              aria-hidden="true"
              class="object-cover w-full h-full dark:hidden"
              src="/src/assets/img/forgot-password-office.jpeg"
              alt="Office"
            />
            <img
              aria-hidden="true"
              class="hidden object-cover w-full h-full dark:block"
              src="/src/assets/img/forgot-password-office-dark.jpeg"
              alt="Office"
            />
          </div>
          <div class="flex items-center justify-center p-6 sm:p-12 md:w-1/2">
            <div class="w-full">

              <!-- Back to login -->
              <a href="/login" class="flex items-center text-sm justify-end text-purple-600 fw-bold hover:underline mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
                Back to login
              </a>

            

              <h1 class="mb-1 text-xl font-semibold text-gray-700 dark:text-gray-200">
                Forgot password?
              </h1>
              <p class="mb-6 text-sm text-gray-500 dark:text-gray-400">
                No worries! Enter your email and we'll send you a reset link.
              </p>

              <form id="forgot-password-form">
                <label class="block text-sm">
                  <span class="text-gray-700 dark:text-gray-400">Email address</span>
                  <input
                    type="email"
                    id="email"
                    class="block w-full mt-1 text-sm dark:border-gray-600 dark:bg-gray-700 focus:border-purple-400 focus:outline-none focus:shadow-outline-purple dark:text-gray-300 dark:focus:shadow-outline-gray form-input"
                    placeholder="you@example.com"
                    maxlength="100"
                    autocomplete="email"
                  />
                  <span id="validation-email" class="text-red-600 text-xs mt-1 block"></span>
                </label>

                <button
                  type="submit"
                  id="submit-btn"
                  class="flex items-center justify-center w-full px-4 py-2 mt-4 text-sm font-medium leading-5 text-white transition-colors duration-150 bg-purple-600 border border-transparent rounded-lg hover:bg-purple-700 active:bg-purple-600 focus:outline-none focus:shadow-outline-purple"
                >
                  <svg id="btn-icon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                  </svg>
                  Verify
                </button>
              </form>

              <p class="mt-6 text-xs text-center text-gray-400 dark:text-gray-500">
                Remembered your password?
                <a href="/login" class="text-purple-600 hover:underline font-medium">Log in</a>
              </p>

            </div>
          </div>
        </div>
      </div>
    </div>

<script src="/src/js/forgot_password.js"></script>
<script src="/src/js/notification/notification.js"></script>
{{ template "footer.html" . }}
{{ end }}
