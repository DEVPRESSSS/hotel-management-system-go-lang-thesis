{{ define "calendar.html" }}
{{ template "dashboard_header.html" . }}

<!--Render the calendar-->
<div id="calendar" class="shadow-sm w-full">

</div>

<!-- Modal Overlay -->
<div id="eventModal" class="fixed inset-0 bg-gray-900 bg-opacity-50 hidden items-center justify-center z-50 p-4 backdrop-blur-sm">
    <div class="bg-white rounded-lg shadow-lg w-full max-w-2xl transform transition-all overflow-hidden">

        <!-- Modal Header -->
        <div class="flex items-center justify-between px-6 py-4 bg-purple-600">
            <h3 class="text-white font-bold tracking-widest" id="header-action"></h3>
            
        </div>

        <!-- Body -->
        <div class="flex flex-col gap-4 p-4 bg-gray-100">

            <!-- Date Row -->
            <div class="bg-white rounded-xl px-6 py-4 flex items-center justify-between">

                <!-- Check-in -->
                <div class="flex flex-col">
                    <span class="text-xs text-gray-400 uppercase tracking-wide mb-1">Check-in</span>
                    <span class="text-purple-600 font-semibold text-sm" id="check-in"></span>
                </div>

                <!-- Duration -->
                <div class="flex flex-col items-center">
                    <span class="text-xs text-gray-400 uppercase tracking-wide mb-1">Duration</span>
                    <span class="text-purple-600 font-semibold text-sm" id="duration"></span>
                </div>

                <!-- Check-out -->
                <div class="flex flex-col items-end">
                    <span class="text-xs text-gray-400 uppercase tracking-wide mb-1">Check-out</span>
                    <span class="text-purple-600 font-semibold text-sm" id="check-out"></span>
                </div>

            </div>

            <!-- Guest Info + Booking Details Row -->
            <div class="flex flex-row items-start gap-4">
                <!--Guest information-->
                 <div class="flex-1 bg-white rounded-xl p-4">
                    <h4 class="text-sm text-gray-400 border-b border-purple-400 pb-2 mb-3">
                        Guest Information <span id="guest-count"></span>
                    </h4>

                    <!-- Guest List — rendered dynamically -->
                    <div class="flex flex-col gap-2" id="guest-list">
                        <!-- filled by JS -->
                    </div>
                </div>

                <!-- Booking Details -->
                <div class="flex-1 bg-white rounded-xl p-4">
                    <h4 class="text-sm text-gray-400 border-b border-purple-400 pb-2 mb-3">
                        Booking Details
                    </h4>

                    <div class="flex flex-col gap-3">

                        <!-- Room -->
                        <div class="flex items-center justify-between">
                            <div class="flex flex-col">
                                <span class="text-xs text-gray-400 uppercase tracking-wide">Room</span>
                                <span class="font-semibold text-gray-800 text-sm" id="room-number"></span>
                            </div>
                            <span class="bg-purple-100 text-purple-600 text-xs font-medium px-3 py-1 rounded-full" id="room-type">
                                
                            </span>
                        </div>

                        <!-- Divider -->
                        <div class="border-t border-gray-100"></div>

                        <!-- Amount + Payment Status -->
                        <div class="flex items-center justify-between">
                            <div class="flex flex-col">
                                <span class="text-xs text-gray-400 uppercase tracking-wide">Total Amount</span>
                                <span class="font-bold text-gray-900 text-lg" id="room-price"></span>
                            </div>
                            <span class="bg-green-100 text-green-600 text-xs font-semibold px-3 py-1 rounded-full" id="payment-status">
                            
                            </span>
                        </div>

                    </div>
                </div>

            </div>
        </div>

        <!-- Modal Footer -->
        <div class="flex items-center justify-end gap-2 px-4 py-3 bg-white border-t border-gray-200">
            <button
                onclick="closeModal()"
                class="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">
                Close
            </button>
       
        </div>

    </div>
</div>


<script type="module" src="/src/js/calendar.js"></script>
{{ template "dashboard_footer.html" }}
{{end}}
